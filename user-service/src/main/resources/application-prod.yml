# 用户服务 - 生产环境配置
spring:
  # 禁用 Nacos 配置导入（必须在最前面）
  config:
    import: []
  # 数据源配置（使用服务器MySQL）
  datasource:
    url: jdbc:mysql://localhost:3306/xuetu_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456  # 服务器MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # Redis配置（使用服务器Redis）
  redis:
    host: 8.141.106.92
    port: 6379
    password: 
    database: 0
    
  # 禁用 Nacos（生产环境不使用）
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# 日志配置（生产环境只输出INFO级别）
logging:
  level:
    com.star.user: INFO
    root: INFO
  file:
    path: /var/log/xuetu/user-service
    name: /var/log/xuetu/user-service/user-service.log
