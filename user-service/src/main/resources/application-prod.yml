# 用户服务 - 生产环境配置
spring:
  application:
    name: user-service  # 服务名称，用于Nacos注册
    
  # 数据源配置（使用服务器1的MySQL）
  datasource:
    url: jdbc:mysql://8.141.106.92:3306/xuetu_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # Redis配置（使用服务器1的Redis）
  redis:
    host: 8.141.106.92
    port: 6379
    password: 
    database: 0
    
  # 启用 Nacos 服务注册与发现
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 8.141.106.92:8848
        namespace: xuetu-prod
        group: DEFAULT_GROUP
      config:
        enabled: false  # 配置中心暂不启用

# 日志配置（生产环境只输出INFO级别）
logging:
  level:
    com.star.user: INFO
    root: INFO
  file:
    path: /var/log/xuetu/user-service
    name: /var/log/xuetu/user-service/user-service.log
