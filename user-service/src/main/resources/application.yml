# 用户服务配置
server:
  port: 8088  # 用户服务端口

spring:
  application:
    name: user-service  # 服务名称
  
  # 配置数据导入（Spring Boot 2.4+ 必需）
  config:
    import: []
    
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/xuetu_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 请根据实际情况修改
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        
  # Spring Cloud 配置
  cloud:
    nacos:
      # 服务发现配置
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        
      # 配置中心（可选）
      config:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yml
        enabled: false  # 暂时禁用，避免连接问题

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.star.user.entity
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL日志
  global-config:
    db-config:
      id-type: auto  # 主键自增
      logic-delete-field: deleted  # 逻辑删除字段名
      logic-delete-value: 1  # 逻辑删除值
      logic-not-delete-value: 0  # 未删除值

# JWT配置
jwt:
  secret: xuetu-user-service-jwt-secret-key-2024
  expiration: 86400  # 24小时

# 日志配置
logging:
  level:
    com.star.user: DEBUG
    org.springframework.cloud: INFO
    root: INFO
  # 日志文件配置
  file:
    path: logs/user-service  # 日志文件存放路径
    name: logs/user-service/user-service.log  # 日志文件名
  pattern:
    # 控制台日志格式
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"
    # 文件日志格式
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"
  # 日志文件轮转配置
  logback:
    rollingpolicy:
      max-file-size: 100MB  # 单个文件最大大小
      max-history: 30  # 保留30天的日志
      total-size-cap: 3GB  # 总日志大小限制
    
# Knife4j API文档配置
knife4j:
  enable: true
  openapi:
    title: 用户服务API文档
    description: 学途在线教育平台-用户服务
    version: 1.0.0
    concat: star@xuetu.com

# 文件上传配置
file:
  upload:
    # 上传文件保存路径（服务器本地路径，对应Nginx配置的media目录）
    path: /www/wwwroot/media/UserAvatar
    # 文件访问基础URL
    base-url: http://8.141.106.92/media/UserAvatar
    # 最大文件大小（2MB）
    max-size: 2097152

# Spring Boot 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
    
# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always