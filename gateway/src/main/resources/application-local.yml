# 本地开发模式网关配置（不依赖Nacos）
server:
  port: 8080

spring:
  application:
    name: gateway
    
  # Spring Cloud Gateway 配置
  cloud:
    # 禁用Nacos
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    
    # 网关路由配置 - 本地直连模式
    gateway:
      routes:
        # ========== 认证服务路由 ==========
        - id: auth-service
          uri: http://localhost:8088
          predicates:
            - Path=/auth/**
          
        # ========== 用户服务路由 ==========
        - id: user-service
          uri: http://localhost:8088
          predicates:
            - Path=/user/**
            
        # ========== 课程服务路由 ==========
        - id: course-service
          uri: http://localhost:8077
          predicates:
            - Path=/course/**
            
        # 分类服务路由
        - id: category-service
          uri: http://localhost:8077
          predicates:
            - Path=/category/**
            
        # 章节服务路由
        - id: chapter-service
          uri: http://localhost:8077
          predicates:
            - Path=/chapter/**
            
        # 课时服务路由
        - id: lesson-service
          uri: http://localhost:8077
          predicates:
            - Path=/lesson/**
            
        # 评论服务路由
        - id: comment-service
          uri: http://localhost:8077
          predicates:
            - Path=/comment/**
            
        # ========== 订单服务路由 ==========
        - id: order-service  
          uri: http://localhost:8033
          predicates:
            - Path=/api/orders/**
            
        # 支付服务路由
        - id: payment-service
          uri: http://localhost:8033
          predicates:
            - Path=/api/payments/**
            
        # 用户课程服务路由
        - id: user-course-service
          uri: http://localhost:8033
          predicates:
            - Path=/api/user-courses/**
            
        # ========== 学习服务路由 ==========
        - id: learning-service
          uri: http://localhost:8044
          predicates:
            - Path=/learning/**
            
        # ========== AI服务路由 ==========
        - id: ai-chat-service
          uri: http://localhost:8066
          predicates:
            - Path=/chat/**
            
        - id: ai-analysis-service
          uri: http://localhost:8066
          predicates:
            - Path=/analysis/**
            
        - id: ai-recommend-service
          uri: http://localhost:8066
          predicates:
            - Path=/recommend/**
            
        # ========== 管理服务路由 ==========
        - id: role-service
          uri: http://localhost:8055
          predicates:
            - Path=/role/**
            
        - id: permission-service
          uri: http://localhost:8055
          predicates:
            - Path=/permission/**
            
        # API文档路由
        - id: course-service-docs
          uri: http://localhost:8077
          predicates:
            - Path=/v3/api-docs/course/**
            
        - id: user-service-docs
          uri: http://localhost:8088
          predicates:
            - Path=/v3/api-docs/user/**
      
      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      
      # 默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

# Redis配置（可选）
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms

# JWT配置
jwt:
  secret: xuetu-gateway-jwt-secret-key-2024
  expiration: 86400

# 日志配置
logging:
  level:
    com.xuetu.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"