# 网关服务配置
server:
  port: 8080  # 网关端口

spring:
  application:
    name: gateway  # 服务名称
  
  # Spring Cloud Gateway 配置
  cloud:
    # Nacos配置（本地开发模式下会被local配置覆盖）
    nacos:
      # 服务发现配置
      discovery:
        server-addr: localhost:8848  # Nacos服务器地址
        namespace: public  # 命名空间
        group: DEFAULT_GROUP  # 分组
        enabled: false  # 本地开发模式禁用
        
      # 配置中心（可选）
      config:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yml
        enabled: false  # 暂时禁用，避免连接问题
        import-check:
          enabled: false  # 禁用强制导入检查
    
    # 网关路由配置
    gateway:
      # 路由规则配置 - 完整版本
      routes:
        # ========== 认证服务路由 ==========
        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**
          
        # ========== 用户服务路由 ==========
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
            
        # ========== 课程服务路由 ==========
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/course/**
            
        # 分类服务路由
        - id: category-service
          uri: lb://course-service
          predicates:
            - Path=/category/**
            
        # 章节服务路由
        - id: chapter-service
          uri: lb://course-service
          predicates:
            - Path=/chapter/**
            
        # 课时服务路由
        - id: lesson-service
          uri: lb://course-service
          predicates:
            - Path=/lesson/**
            
        # 评论服务路由
        - id: comment-service
          uri: lb://course-service
          predicates:
            - Path=/comment/**
            
        # ========== 订单服务路由 ==========
        - id: order-service  
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
            
        # 支付服务路由
        - id: payment-service
          uri: lb://order-service
          predicates:
            - Path=/api/payments/**
            
        # 用户课程服务路由
        - id: user-course-service
          uri: lb://order-service
          predicates:
            - Path=/api/user-courses/**
            
        # ========== 学习服务路由 ==========
        - id: learning-service
          uri: lb://learning-service
          predicates:
            - Path=/learning/**
            
        # ========== AI服务路由 ==========
        - id: ai-chat-service
          uri: lb://ai-service
          predicates:
            - Path=/chat/**
            
        - id: ai-analysis-service
          uri: lb://ai-service
          predicates:
            - Path=/analysis/**
            
        - id: ai-recommend-service
          uri: lb://ai-service
          predicates:
            - Path=/recommend/**
            
        # ========== 管理服务路由 ==========
        - id: role-service
          uri: lb://admin-service
          predicates:
            - Path=/role/**
            
        - id: permission-service
          uri: lb://admin-service
          predicates:
            - Path=/permission/**
            
        # API文档路由配置
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/api/user/v3/api-docs/**
          filters:
            - StripPrefix=2
            
        - id: course-service-docs
          uri: lb://course-service
          predicates:
            - Path=/api/course/v3/api-docs/**
          filters:
            - StripPrefix=2
            
        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/api/order/v3/api-docs/**
          filters:
            - StripPrefix=2
            
        - id: learning-service-docs
          uri: lb://learning-service
          predicates:
            - Path=/api/learning/v3/api-docs/**
          filters:
            - StripPrefix=2
            
        - id: ai-service-docs
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/v3/api-docs/**
          filters:
            - StripPrefix=2
            
        # 管理服务路由
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=2
      
      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':  # 匹配所有路径
            allowed-origin-patterns: "*"  # 允许所有源
            allowed-methods: "*"  # 允许所有方法
            allowed-headers: "*"  # 允许所有请求头
            allow-credentials: true  # 允许携带凭证
            max-age: 3600  # 预检请求缓存时间
      
      # 默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin  # 去重响应头

  # Redis配置（用于存储黑名单等）
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# JWT配置
jwt:
  secret: xuetu-gateway-jwt-secret-key-2024
  expiration: 86400  # 24小时

# 限流配置
rate-limit:
  redis-rate-limiter:
    replenish-rate: 10  # 每秒允许处理的请求数量
    burst-capacity: 20  # 令牌桶的容量

# 日志配置
logging:
  level:
    com.xuetu.gateway: INFO
    org.springframework.cloud.gateway: DEBUG  # 网关调试日志
    root: INFO
  # 日志文件配置
  file:
    path: logs/gateway  # 日志文件存放路径
    name: logs/gateway/gateway.log  # 日志文件名
  pattern:
    # 控制台日志格式
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"
    # 文件日志格式
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"
  # 日志文件轮转配置
  logback:
    rollingpolicy:
      max-file-size: 100MB  # 单个文件最大大小
      max-history: 30  # 保留30天的日志
      total-size-cap: 3GB  # 总日志大小限制
    
# Knife4j网关聚合配置
knife4j:
  enable: true
  production: false
  openapi:
    title: "学途智慧教育平台 - API文档聚合"
    description: "集成AI功能的微服务在线教育平台完整API文档"
    version: "1.0.0"
    contact: "star@xuetu.com"
    license: "Apache 2.0"
    license-url: "https://www.apache.org/licenses/LICENSE-2.0"
  gateway:
    enabled: true
    strategy: manual
    discover:
      enabled: false
      version: openapi3
  # 通过自定义控制器处理聚合

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点
  endpoint:
    health:
      show-details: always