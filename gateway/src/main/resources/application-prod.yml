# Gateway 生产环境配置
spring:
  # 禁用 Nacos 配置导入（必须在最前面）
  config:
    import: []
  # 禁用 Nacos
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    
    # 网关路由配置（生产环境 - 直接URL）
    gateway:
      routes:
        # ========== 认证服务路由 ==========
        - id: auth-service
          uri: http://localhost:8088
          predicates:
            - Path=/auth/**
          
        # ========== 用户服务路由 ==========
        - id: user-service
          uri: http://localhost:8088
          predicates:
            - Path=/user/**
            
        # ========== 课程服务路由 ==========
        - id: course-service
          uri: http://localhost:8077
          predicates:
            - Path=/course/**
            
        - id: category-service
          uri: http://localhost:8077
          predicates:
            - Path=/category/**
            
        - id: chapter-service
          uri: http://localhost:8077
          predicates:
            - Path=/chapter/**
            
        - id: lesson-service
          uri: http://localhost:8077
          predicates:
            - Path=/lesson/**
            
        - id: comment-service
          uri: http://localhost:8077
          predicates:
            - Path=/comment/**
            
        # ========== 订单服务路由 ==========
        - id: order-service  
          uri: http://localhost:8033
          predicates:
            - Path=/api/orders/**
            
        - id: payment-service
          uri: http://localhost:8033
          predicates:
            - Path=/api/payments/**
            
        - id: user-course-service
          uri: http://localhost:8033
          predicates:
            - Path=/api/user-courses/**
            
        # ========== 学习服务路由 ==========
        - id: learning-service
          uri: http://localhost:8044
          predicates:
            - Path=/learning/**
            
        # ========== AI服务路由 ==========
        - id: ai-chat-service
          uri: http://localhost:8066
          predicates:
            - Path=/chat/**
            
        - id: ai-analysis-service
          uri: http://localhost:8066
          predicates:
            - Path=/analysis/**
            
        - id: ai-recommend-service
          uri: http://localhost:8066
          predicates:
            - Path=/recommend/**
            
        # ========== 管理服务路由 ==========
        - id: role-service
          uri: http://localhost:8055
          predicates:
            - Path=/role/**
            
        - id: permission-service
          uri: http://localhost:8055
          predicates:
            - Path=/permission/**

# 日志配置
logging:
  level:
    com.xuetu.gateway: INFO
    root: INFO
  file:
    path: /var/log/xuetu/gateway
    name: /var/log/xuetu/gateway/gateway.log
