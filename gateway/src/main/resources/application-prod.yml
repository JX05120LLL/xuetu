# Gateway 生产环境配置
spring:
  application:
    name: gateway
  
  # Redis配置（生产环境）
  redis:
    host: ${REDIS_HOST:8.141.106.92}
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
    
  # 启用 Nacos 服务发现
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: 8.141.106.92:8848
        namespace: xuetu-prod
        group: DEFAULT_GROUP
        ip: 112.126.85.23  # 使用宿主机IP
        port: 8080         # 使用宿主机端口
      config:
        enabled: false
        import-check:
          enabled: false  # 禁用强制导入检查
    
    # 网关路由配置（生产环境 - 使用Nacos服务发现）
    gateway:
      # 启用服务发现路由
      discovery:
        locator:
          enabled: true  # 启用自动根据服务名创建路由
          lower-case-service-id: true  # 服务名转小写
          
      routes:
        # ========== 认证服务路由 ==========
        - id: auth-service
          uri: lb://user-service  # 使用负载均衡，从Nacos获取服务地址
          predicates:
            - Path=/auth/**
            
        # 添加API前缀的认证服务路由
        - id: api-auth-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
          
        # ========== 用户服务路由 ==========
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
            
        # 添加API前缀的用户服务路由
        - id: api-user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
            
        # ========== 课程服务路由 ==========
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/course/**
            
        - id: category-service
          uri: lb://course-service
          predicates:
            - Path=/category/**
            
        - id: chapter-service
          uri: lb://course-service
          predicates:
            - Path=/chapter/**
            
        - id: lesson-service
          uri: lb://course-service
          predicates:
            - Path=/lesson/**
            
        - id: comment-service
          uri: lb://course-service
          predicates:
            - Path=/comment/**
            
        # ========== 订单服务路由 ==========
        - id: order-service  
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
            
        - id: payment-service
          uri: lb://order-service
          predicates:
            - Path=/api/payments/**
            
        - id: user-course-service
          uri: lb://order-service
          predicates:
            - Path=/api/user-courses/**
            
        # ========== 学习服务路由 ==========
        - id: learning-service
          uri: lb://learning-service
          predicates:
            - Path=/learning/**
            
        # ========== AI服务路由 ==========
        - id: ai-chat-service
          uri: lb://ai-service
          predicates:
            - Path=/chat/**
            
        - id: ai-analysis-service
          uri: lb://ai-service
          predicates:
            - Path=/analysis/**
            
        - id: ai-recommend-service
          uri: lb://ai-service
          predicates:
            - Path=/recommend/**
            
        # ========== 管理服务路由 ==========
        - id: role-service
          uri: lb://admin-service
          predicates:
            - Path=/role/**
            
        - id: permission-service
          uri: lb://admin-service
          predicates:
            - Path=/permission/**

# 日志配置
logging:
  level:
    com.xuetu.gateway: INFO
    root: INFO
  file:
    path: /var/log/xuetu/gateway
    name: /var/log/xuetu/gateway/gateway.log
