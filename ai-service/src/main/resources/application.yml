# AI服务配置
server:
  port: 8066  # AI服务端口

spring:
  application:
    name: ai-service  # 服务名称
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/xuetu_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 请根据实际情况修改
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 3  # 使用数据库3，避免冲突
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        
  # Spring Cloud 配置
  cloud:
    nacos:
      # 服务发现配置
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: public
        group: DEFAULT_GROUP
        # Nacos 未启动或未就绪时仍允许应用启动，后续会自动重试注册
        fail-fast: false
        
      # 配置中心（可选）
      config:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yml
        enabled: false  # 暂时禁用
        import-check:
          enabled: false  # 禁用强制导入检查

  # Spring AI 配置（DashScope 支持 OpenAI 兼容协议，直接对接）
  # 注意：base-url 不要带 /v1，Spring AI 会自动拼接 /v1/chat/completions 和 /v1/embeddings
  ai:
    openai:
      api-key: ${ALIYUN_AI_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          model: qwen-plus
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          # text-embedding-v3 默认输出 1024 维，与 Qdrant collection 维度保持一致
          model: text-embedding-v3
    mcp:
      server:
        name: xuetu-ai-skills
        version: 1.0.0
    vectorstore:
      qdrant:
        host: localhost
        # Qdrant gRPC 端口（Spring AI Qdrant 使用 gRPC 通信）
        port: 6334
        collection-name: xuetu_knowledge
        # 首次启动时自动创建 collection（维度 1024，余弦相似度）
        initialize-schema: true

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.star.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 阿里通义千问配置（保留，QwenAIClient 继续使用此配置）
aliyun:
  ai:
    api-key: ${ALIYUN_AI_KEY}
    api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
    model: qwen-turbo
    timeout: 90
    max-tokens: 4000
    temperature: 0.85
    embedding:
      api-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
      model: text-embedding-v3
      dimension: 1024

# 日志配置
logging:
  level:
    com.star.ai: DEBUG
    org.springframework.cloud: INFO
    root: INFO
  file:
    path: logs/ai-service
    name: logs/ai-service/ai-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
    
# Knife4j API文档配置
knife4j:
  enable: true
  openapi:
    title: AI服务API文档
    description: 学途在线教育平台-AI智能服务(通义千问)
    version: 1.0.0
    contact: star@xuetu.com
    
# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Feign配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

# OpenClaw 核心配置（设计文档 4.2）
openclaw:
  gateway:
    base-url: http://localhost:18789
    token: ${OPENCLAW_TOKEN:706edbf328264433d5ef22f73b2d744183fbd3633a63154f}
    timeout: 60000
  skill:
    auto-register: true
    service-base-url: http://host.docker.internal:8066
