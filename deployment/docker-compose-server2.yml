# 服务器2 - User + Course + Learning服务
version: '3.8'

services:
  # 用户服务
  user-service:
    image: openjdk:17-slim
    container_name: xuetu-user-service
    restart: always
    ports:
      - "8088:8088"
    environment:
      JAVA_OPTS: "-Xms96m -Xmx256m -Dspring.profiles.active=prod"
      NACOS_SERVER: "8.141.106.92:8848"
      MYSQL_HOST: "8.141.106.92"
      REDIS_HOST: "8.141.106.92"
      TZ: Asia/Shanghai
    volumes:
      - ./jars/user-service.jar:/app/user-service.jar
      - ./logs:/var/log/xuetu
      - /www/wwwroot/media:/www/wwwroot/media
    command: java ${JAVA_OPTS} -jar /app/user-service.jar
    networks:
      - xuetu-network

  # 课程服务
  course-service:
    image: openjdk:17-slim
    container_name: xuetu-course-service
    restart: always
    ports:
      - "8077:8077"
    environment:
      JAVA_OPTS: "-Xms96m -Xmx256m -Dspring.profiles.active=prod"
      NACOS_SERVER: "8.141.106.92:8848"
      MYSQL_HOST: "8.141.106.92"
      REDIS_HOST: "8.141.106.92"
      TZ: Asia/Shanghai
    volumes:
      - ./jars/course-service.jar:/app/course-service.jar
      - ./logs:/var/log/xuetu
    command: java ${JAVA_OPTS} -jar /app/course-service.jar
    networks:
      - xuetu-network

  # 学习服务
  learning-service:
    image: openjdk:17-slim
    container_name: xuetu-learning-service
    restart: always
    ports:
      - "8044:8044"
    environment:
      JAVA_OPTS: "-Xms96m -Xmx256m -Dspring.profiles.active=prod"
      NACOS_SERVER: "8.141.106.92:8848"
      MYSQL_HOST: "8.141.106.92"
      REDIS_HOST: "8.141.106.92"
      TZ: Asia/Shanghai
    volumes:
      - ./jars/learning-service.jar:/app/learning-service.jar
      - ./logs:/var/log/xuetu
    command: java ${JAVA_OPTS} -jar /app/learning-service.jar
    networks:
      - xuetu-network

  # Portainer Agent
  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - xuetu-network

networks:
  xuetu-network:
    driver: bridge
