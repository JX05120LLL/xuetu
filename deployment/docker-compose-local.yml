# 本地开发环境 - 全量中间件一键部署
# 包含：MySQL + Redis + RocketMQ（NameServer + Broker + Dashboard）+ Nacos + Qdrant
#
# 使用方法（在 deployment 目录下执行）：
#   启动：docker-compose -f docker-compose-local.yml up -d
#   停止：docker-compose -f docker-compose-local.yml down
#   查看日志：docker-compose -f docker-compose-local.yml logs -f broker
#
# 管理界面：
#   Nacos:             http://localhost:8848/nacos  (nacos/nacos)
#   RocketMQ Dashboard: http://localhost:8180       (无需登录)
#   Qdrant Dashboard:   http://localhost:6333/dashboard

version: '3.8'

services:

  # ─── MySQL（业务数据库）───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: xuetu-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: xuetu_db
      TZ: Asia/Shanghai
    volumes:
      - xuetu_mysql_data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/00-init.sh
      - ../sql/xuetu_db.sql:/tmp/xuetu_db.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - xuetu-local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xuetu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - xuetu-local

  # ─── RocketMQ NameServer（注册中心，记录 Broker 地址）────────────────────────
  namesrv:
    image: apache/rocketmq:4.9.7
    container_name: xuetu-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
      TZ: Asia/Shanghai
    networks:
      - xuetu-local

  # ─── RocketMQ Broker（真正存储和转发消息）──────────────────────────────────
  broker:
    image: apache/rocketmq:4.9.7
    container_name: xuetu-broker
    restart: unless-stopped
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    # 不挂载宿主机文件，直接在容器内生成配置再启动，避免 Windows Docker 文件挂载问题
    entrypoint: >
      sh -c "mkdir -p /home/rocketmq/conf &&
      echo 'brokerClusterName=DefaultCluster' > /home/rocketmq/conf/broker.conf &&
      echo 'brokerName=broker-a' >> /home/rocketmq/conf/broker.conf &&
      echo 'brokerId=0' >> /home/rocketmq/conf/broker.conf &&
      echo 'brokerIP1=127.0.0.1' >> /home/rocketmq/conf/broker.conf &&
      echo 'namesrvAddr=namesrv:9876' >> /home/rocketmq/conf/broker.conf &&
      echo 'defaultTopicQueueNums=4' >> /home/rocketmq/conf/broker.conf &&
      echo 'autoCreateTopicEnable=true' >> /home/rocketmq/conf/broker.conf &&
      echo 'flushDiskType=ASYNC_FLUSH' >> /home/rocketmq/conf/broker.conf &&
      echo 'listenPort=10911' >> /home/rocketmq/conf/broker.conf &&
      sh mqbroker -c /home/rocketmq/conf/broker.conf"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
      TZ: Asia/Shanghai
    depends_on:
      - namesrv
    networks:
      - xuetu-local

  # ─── RocketMQ Dashboard（可视化管理界面）─────────────────────────────────
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: xuetu-rocketmq-dashboard
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=namesrv:9876 -Xms256m -Xmx256m"
      TZ: Asia/Shanghai
    depends_on:
      - namesrv
    networks:
      - xuetu-local

  # ─── Nacos（服务注册中心，本地用内嵌模式）─────────────────────────────────────
  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: xuetu-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 128m
      JVM_XMX: 256m
      TZ: Asia/Shanghai
    networks:
      - xuetu-local

  # ─── Qdrant（向量数据库，RAG 知识库问答用）────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: xuetu-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Dashboard
      - "6334:6334"   # gRPC（Spring AI 使用）
    volumes:
      - xuetu_qdrant_data:/qdrant/storage
    networks:
      - xuetu-local

networks:
  xuetu-local:
    driver: bridge

volumes:
  xuetu_mysql_data:
  xuetu_qdrant_data:
