version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: xuetu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: xuetu_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - xuetu-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: xuetu-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - xuetu-network

  # Gateway 网关服务
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: xuetu-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

  # User Service 用户服务
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: xuetu-user-service
    restart: always
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

  # Course Service 课程服务
  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: xuetu-course-service
    restart: always
    ports:
      - "8077:8077"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

  # Learning Service 学习服务
  learning-service:
    build:
      context: ./learning-service
      dockerfile: Dockerfile
    container_name: xuetu-learning-service
    restart: always
    ports:
      - "8044:8044"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

  # Order Service 订单服务
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: xuetu-order-service
    restart: always
    ports:
      - "8033:8033"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

  # AI Service AI服务
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: xuetu-ai-service
    restart: always
    ports:
      - "8066:8066"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

  # Admin Service 管理服务
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: xuetu-admin-service
    restart: always
    ports:
      - "8055:8055"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - xuetu-network

networks:
  xuetu-network:
    driver: bridge
